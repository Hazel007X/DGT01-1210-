<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reserve a Hotel</title>
</head>
<body>

 <h2>Reserve a Hotel:</h2>
    <form oninput="
        pricePerRoom.value = 1500 + (+c.value * 300);
        totalPrice.value = +r.value * +n.value * (1500 + (+c.value * 300));
     ">
        <label for="hotel-choice">Choose a Hotel: </label>
        <input type="text" id="hotel-choice" list="hotels" required>
        <datalist id="hotels">
            <option value="โคราชคันทรีคลับ">
            <option value="โคราชรีสอร์ท">
            <option value="สุรสัมมนาคาร">
            <option value="สุรนารีวิลล์">
            <option value="สีมาธานี">
        </datalist>
        <br><br>

        Check-in: <input type="date" name="Check-in" required> 
        Nights: <input type="number" name="n" min="1" max="30" value="3" required><br><br>
        
        Rooms: <input type="number" name="r" min="1" max="9" value="2" required> 
        Adults per room: <input type="number" name="a" min="1" max="2" value="1" required> 
        Children per room: <input type="number" name="c" min="0" max="2" value="2" required><br><br>
        
        <strong>Price per room:</strong> <output name="pricePerRoom">0</output> Baht<br><br>
        <strong>Total Price:</strong> <output name="totalPrice">0</output> Baht<br><br>

        <input type="submit" value="Reserve">
    </form>

</body>
</html>
